<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIGNAL-FOG // KCTC 전술 시뮬레이터</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

  <style>
    /* ── CSS 변수 ── */
    :root {
      --col-bg:       #080c0a;
      --col-surface:  #0d1410;
      --col-border:   #1e3a28;
      --col-grid:     rgba(30, 58, 40, 0.35);
      --col-green:    #39ff8e;
      --col-green-dim:#1e6644;
      --col-amber:    #ffb84d;
      --col-red:      #ff4444;
      --col-text:     #c8e6c9;
      --col-text-dim: #4a7c59;
      --font-mono:    'Share Tech Mono', monospace;
      --font-kr:      'Noto Sans KR', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--col-bg);
      color: var(--col-text);
      font-family: var(--font-mono);
      overflow: hidden;
      cursor: crosshair;
    }

    /* 스캔라인 */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.18) 2px,rgba(0,0,0,.18) 4px);
    }

    /* 격자 배경 */
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(var(--col-grid) 1px,transparent 1px),
                        linear-gradient(90deg,var(--col-grid) 1px,transparent 1px);
      background-size: 40px 40px;
      animation: gridDrift 120s linear infinite;
    }
    @keyframes gridDrift { from{background-position:0 0} to{background-position:40px 40px} }

    #app-wrapper {
      position: relative; z-index: 1;
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
    }

    /* ─── HEADER ─── */
    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 28px;
      border-bottom: 1px solid var(--col-border);
      background: rgba(8,12,10,.92);
      flex-shrink: 0;
    }
    .header-title { display: flex; align-items: baseline; gap: 16px; }
    .header-title h1 {
      font-size: 1.7rem; letter-spacing: .22em; color: var(--col-green);
      text-shadow: 0 0 12px rgba(57,255,142,.55); animation: flicker 8s infinite;
    }
    @keyframes flicker { 0%,95%,100%{opacity:1} 96%{opacity:.6} 97%{opacity:1} 98%{opacity:.4} }
    .header-title span { font-size: .85rem; color: var(--col-text-dim); letter-spacing: .1em; }
    .header-status {
      display:flex; gap:24px; align-items:center;
      font-size:.85rem; color:var(--col-text-dim); letter-spacing:.05em;
    }
    .status-dot {
      display:inline-block; width:8px; height:8px; border-radius:50%;
      background:var(--col-green); box-shadow:0 0 6px var(--col-green);
      animation:pulse 2s ease-in-out infinite;
    }
    .status-dot.amber { background:var(--col-amber); box-shadow:0 0 6px var(--col-amber); }
    .status-dot.red   { background:var(--col-red);   box-shadow:0 0 6px var(--col-red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ─── MAIN LAYOUT — 캔버스 단독 ─── */
    #main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* ─── CENTER — Three.js 캔버스 (전체 영역) ─── */
    #game-canvas-container {
      flex: 1;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      background: #040604;
      overflow: hidden;
      min-height: 0;
    }

    /* 부팅 화면 */
    #boot-screen {
      position: absolute; inset: 0; z-index: 10; background: #040604;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    }
    .boot-logo {
      font-size: 4.2rem; letter-spacing: .35em; color: var(--col-green);
      text-shadow: 0 0 30px rgba(57,255,142,.6),0 0 60px rgba(57,255,142,.2);
      animation: logoGlow 3s ease-in-out infinite alternate;
    }
    @keyframes logoGlow { from{text-shadow:0 0 20px rgba(57,255,142,.4)} to{text-shadow:0 0 50px rgba(57,255,142,.9),0 0 100px rgba(57,255,142,.3)} }
    .boot-sub { font-size:.9rem; letter-spacing:.22em; color:var(--col-text-dim); }
    .boot-sub span { font-family:var(--font-kr); letter-spacing:.05em; }
    #boot-log { font-size:.82rem; color:var(--col-green-dim); text-align:left; width:480px; max-height:140px; overflow:hidden; line-height:1.8; }
    .log-line { opacity:0; animation:logIn .15s forwards; }
    @keyframes logIn { to{opacity:1} }
    .boot-bar-wrap { width:480px; height:3px; background:var(--col-border); }
    #boot-bar { height:100%; width:0%; background:var(--col-green); box-shadow:0 0 8px var(--col-green); transition:width .4s ease; }

    /* Three.js 캔버스 */
    #game-canvas-container canvas {
      display: block !important;
      position: absolute !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
    }

    /* ─── HUD 오버레이 (캔버스 위) ─── */
    #hud-overlay {
      position: absolute; top: 14px; left: 14px; right: 14px;
      display: flex; justify-content: space-between;
      pointer-events: none; z-index: 5;
    }
    .hud-chip {
      background: rgba(8,12,10,.82); border:1px solid var(--col-border);
      padding: 6px 14px; font-size:.9rem; letter-spacing:.12em; color:var(--col-text-dim);
    }
    .hud-chip .val { color:var(--col-green); }

    /* ─── 인게임 통신 로그 (캔버스 우측 하단 오버레이) ─── */
    #comms-overlay {
      position: absolute;
      right: 14px; bottom: 14px;
      width: 320px;
      max-height: 420px;
      display: flex; flex-direction: column;
      background: rgba(8,12,10,.82);
      border: 1px solid var(--col-border);
      pointer-events: auto;
      z-index: 5;
      overflow: hidden;
    }
    #comms-overlay-title {
      padding: 5px 12px; font-size:.72rem; letter-spacing:.16em;
      color: var(--col-green-dim); border-bottom: 1px solid var(--col-border);
      text-transform: uppercase; background: rgba(30,58,40,.18); flex-shrink:0;
    }
    #chat-log {
      flex:1; overflow-y:auto; padding:8px 10px;
      scrollbar-width:thin; scrollbar-color:var(--col-border) transparent;
    }
    #chat-input-area {
      display:flex; border-top:1px solid var(--col-border); flex-shrink:0;
    }
    #chat-input {
      flex:1; padding:6px 10px; background:transparent; border:none; outline:none;
      color:var(--col-text); font-family:var(--font-mono); font-size:.78rem;
      caret-color:var(--col-green);
    }
    #chat-input::placeholder { color:var(--col-text-dim); }
    #chat-send {
      padding:6px 12px; background:transparent; border:none;
      border-left:1px solid var(--col-border);
      color:var(--col-green-dim); font-family:var(--font-mono); font-size:.75rem;
      cursor:pointer; letter-spacing:.06em; transition:color .2s,background .2s;
    }
    #chat-send:hover { color:var(--col-green); background:rgba(57,255,142,.06); }

    /* ─── 분대 상태 오버레이 (캔버스 좌측 하단) ─── */
    #squad-overlay {
      position: absolute;
      left: 14px; bottom: 14px;
      width: 280px;
      max-height: 420px;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 6px;
      pointer-events: auto;
      z-index: 5;
      scrollbar-width: thin;
      scrollbar-color: var(--col-border) transparent;
    }

    .squad-card {
      border: 1px solid var(--col-border);
      padding: 10px 12px 9px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      background: rgba(8,12,10,.82);
    }
    .squad-card:hover  { border-color: var(--col-green-dim); background: rgba(30,58,40,.18); }
    .squad-card.active { border-color: var(--col-green); background: rgba(57,255,142,.05); }

    .squad-card-header {
      display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;
    }
    .squad-badge {
      font-size: .8rem; letter-spacing: .1em; color: var(--col-green);
      border: 1px solid var(--col-green); padding: 1px 7px;
    }
    .squad-status-tag { font-size:.7rem; letter-spacing:.07em; color:var(--col-text-dim); }
    .squad-status-tag.moving  { color:var(--col-amber); }
    .squad-status-tag.combat  { color:var(--col-red); }
    .squad-status-tag.nocomms { color:var(--col-red); animation:pulse 1s infinite; }

    .squad-troops { font-size:.78rem; color:var(--col-text-dim); margin-bottom:5px; }
    .squad-troops span { color:var(--col-text); }

    .comms-row { display:flex; align-items:center; gap:6px; }
    .comms-label { font-size:.68rem; color:var(--col-text-dim); letter-spacing:.06em; width:26px; flex-shrink:0; }
    .stat-bar { flex:1; height:4px; background:var(--col-border); overflow:hidden; }
    .stat-fill { height:100%; background:var(--col-green); box-shadow:0 0 4px var(--col-green); transition:width .6s ease; }
    .stat-fill.warn { background:var(--col-amber); box-shadow:0 0 4px var(--col-amber); }
    .stat-fill.crit { background:var(--col-red);   box-shadow:0 0 4px var(--col-red); }
    .comms-val { font-size:.68rem; color:var(--col-text-dim); width:32px; text-align:right; }

    /* ─── 보급 바 ─── */
    .supply-row { display:flex; align-items:center; gap:6px; margin-top:3px; }
    .supply-label { font-size:.64rem; color:var(--col-text-dim); letter-spacing:.04em; width:26px; flex-shrink:0; }
    .supply-val { font-size:.64rem; color:var(--col-text-dim); width:32px; text-align:right; }

    /* ─── 무기 배지 ─── */
    .weapon-badge {
      font-size:.64rem; letter-spacing:.08em;
      border:1px solid; padding:1px 5px;
      margin-right:4px;
    }

    /* ─── 배급소 정보 칩 ─── */
    #supply-chip {
      background: rgba(8,12,10,.80); border: 1px solid #1e5070;
      padding: 4px 12px; font-size:.75rem; letter-spacing:.08em; color:var(--col-text-dim);
      display: flex; flex-direction:column; gap:2px;
    }
    #supply-chip .depot-line { color:#44aaff; }
    #supply-chip .depot-line.warn { color:var(--col-amber); }
    #supply-chip .depot-line.dead { color:var(--col-red); text-decoration:line-through; }

    /* ─── 배터리/지형 칩 (캔버스 좌측 상단 보조) ─── */
    #info-chips {
      position: absolute; left: 14px; top: 56px;
      display: flex; flex-direction: column; gap: 5px;
      pointer-events: none; z-index: 5;
    }
    .info-chip {
      background: rgba(8,12,10,.80); border: 1px solid var(--col-border);
      padding: 4px 12px; font-size:.8rem; letter-spacing:.1em; color:var(--col-text-dim);
      display: flex; gap: 8px; align-items: center;
    }
    .info-chip .val { color:var(--col-green); }
    .info-chip .val.warn { color:var(--col-amber); }
    .info-chip .val.crit { color:var(--col-red); }
    #terrain-warn {
      display:none;
      background: rgba(40,4,4,.82); border-color:var(--col-red);
      color:var(--col-red); font-size:.72rem; letter-spacing:.08em; padding:4px 10px;
    }

    /* Squad Picker */
    #squad-picker {
      display: none;
      position: absolute;
      z-index: 500;
      width: 224px;
      background: rgba(5, 9, 7, 0.97);
      border: 1px solid var(--col-amber);
      box-shadow: 0 0 28px rgba(255,184,77,.20), 0 4px 20px rgba(0,0,0,.7);
      pointer-events: auto;
      overflow: hidden;
    }
    .picker-title {
      display: flex; align-items: center; gap: 7px;
      padding: 10px 14px 9px; font-size: .78rem; letter-spacing: .14em;
      color: var(--col-amber); background: rgba(255,184,77,.08);
      border-bottom: 1px solid rgba(255,184,77,.22); text-transform: uppercase;
    }
    .picker-icon { font-size: 1rem; }
    .picker-card {
      display: flex; align-items: stretch; cursor: pointer;
      border-bottom: 1px solid var(--col-border); transition: background .15s;
    }
    .picker-card:hover { background: rgba(255,255,255,.05); }
    .picker-card:last-of-type { border-bottom: none; }
    .picker-card-stripe { width: 4px; flex-shrink: 0; background: var(--col-green); }
    .picker-card-content { flex: 1; padding: 9px 10px 8px 11px; min-width: 0; }
    .picker-card-header { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
    .picker-card-name { font-size: .82rem; letter-spacing: .1em; font-weight: bold; }
    .picker-cmd-tag { font-size:.64rem; letter-spacing:.06em; color: var(--col-amber); border: 1px solid var(--col-amber); padding: 1px 5px; }
    .picker-card-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .picker-stat-item { font-size: .7rem; color: var(--col-text-dim); letter-spacing: .04em; white-space: nowrap; }
    .picker-stat-item b { color: var(--col-text); }
    .picker-card-arrow { display: flex; align-items: center; padding: 0 10px; font-size: .8rem; color: var(--col-text-dim); opacity: 0; transition: opacity .15s; }
    .picker-card:hover .picker-card-arrow { opacity: 1; color: var(--col-green); }
    .picker-card-selected { background: rgba(57,255,142,.06); }
    .picker-close { display: flex; align-items: center; justify-content: center; padding: 8px; font-size: .7rem; letter-spacing: .1em; color: var(--col-text-dim); cursor: pointer; border-top: 1px solid var(--col-border); transition: color .15s, background .15s; }
    .picker-close:hover { color: var(--col-red); background: rgba(255,68,68,.06); }

    /* 로그 엔트리 */
    .log-entry { margin-bottom:7px; font-size:.78rem; line-height:1.55; animation:fadeSlide .25s ease forwards; opacity:0; }
    @keyframes fadeSlide { from{opacity:0;transform:translateX(6px)} to{opacity:1;transform:translateX(0)} }
    .log-time { color:var(--col-text-dim); margin-right:4px; }
    .log-sender { color:var(--col-amber); margin-right:4px; }
    .log-text { color:var(--col-text); font-family:var(--font-kr); font-size:.78rem; }
    .log-system { color:var(--col-red); letter-spacing:.07em; }
    .log-distort { color:var(--col-green-dim); font-style:italic; position:relative; }
    .log-distort::after {
      content:attr(data-raw); position:absolute; left:0; top:0;
      color:var(--col-red); opacity:.25; clip-path:inset(30% 0 50% 0);
      animation:glitch 2s infinite;
    }
    @keyframes glitch {
      0%,90%{clip-path:inset(30% 0 50% 0);transform:translateX(0)}
      91%{clip-path:inset(10% 0 60% 0);transform:translateX(-3px)}
      93%{clip-path:inset(50% 0 20% 0);transform:translateX(3px)}
      95%,100%{clip-path:inset(30% 0 50% 0);transform:translateX(0)}
    }

    /* ─── FOOTER ─── */
    #footer {
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 28px; border-top:1px solid var(--col-border);
      background:rgba(8,12,10,.92); flex-shrink:0; gap:20px;
    }
    .turn-timer-wrap { display:flex; align-items:center; gap:12px; }
    .turn-label { font-size:.8rem; letter-spacing:.14em; color:var(--col-text-dim); }
    #turn-timer { font-size:1.6rem; color:var(--col-green); text-shadow:0 0 10px rgba(57,255,142,.5); min-width:48px; text-align:center; }
    #turn-timer.warn { color:var(--col-amber); text-shadow:0 0 10px rgba(255,184,77,.5); }
    #turn-timer.crit { color:var(--col-red); text-shadow:0 0 10px rgba(255,68,68,.7); animation:timerPulse .5s ease-in-out infinite; }
    @keyframes timerPulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .timer-bar-wrap { width:140px; height:3px; background:var(--col-border); }
    #timer-bar { height:100%; width:100%; background:var(--col-green); transition:width 1s linear,background .5s; }
    .action-buttons { display:flex; gap:10px; }
    .btn {
      padding:8px 22px; background:transparent; border:1px solid var(--col-border);
      color:var(--col-text-dim); font-family:var(--font-mono); font-size:.8rem;
      letter-spacing:.1em; cursor:pointer; text-transform:uppercase; transition:all .2s;
    }
    .btn:hover { border-color:var(--col-green); color:var(--col-green); background:rgba(57,255,142,.06); box-shadow:0 0 10px rgba(57,255,142,.12); }
    .btn.primary { border-color:var(--col-green); color:var(--col-green); }
    .btn.primary:hover { background:rgba(57,255,142,.15); box-shadow:0 0 16px rgba(57,255,142,.25); }
    .btn.danger { border-color:var(--col-red); color:var(--col-red); }
    .btn.danger:hover { background:rgba(255,68,68,.08); }
    .footer-status { font-size:.8rem; color:var(--col-text-dim); letter-spacing:.08em; flex:1; text-align:center; }

    /* ─── RESULT OVERLAY ─── */
    #result-overlay {
      display:none; position:absolute; inset:0; z-index:100;
      background:rgba(4,6,4,.88); align-items:center; justify-content:center;
    }
    #result-overlay.show { display:flex; }
    #result-panel {
      border:1px solid var(--col-green); box-shadow:0 0 40px rgba(57,255,142,.18),inset 0 0 20px rgba(57,255,142,.04);
      background:rgba(8,12,10,.98); padding:40px 60px; text-align:center; min-width:360px;
    }
    #result-reason { font-size:.82rem; letter-spacing:.18em; color:var(--col-text-dim); margin-bottom:12px; }
    #result-title { font-size:2.4rem; letter-spacing:.22em; color:var(--col-green); text-shadow:0 0 24px rgba(57,255,142,.6); margin-bottom:22px; }
    #result-title.lose { color:var(--col-red); text-shadow:0 0 24px rgba(255,68,68,.6); }
    .result-sep { width:100%; height:1px; background:var(--col-border); margin:0 0 22px; }
    #result-body { font-size:.84rem; color:var(--col-text-dim); line-height:2.6; margin-bottom:30px; text-align:left; }
    #result-body .rv { color:var(--col-green); float:right; }
    #result-body .rv.red { color:var(--col-red); }
  </style>
</head>

<body>
<div id="app-wrapper">

  <!-- ── HEADER ── -->
  <header id="header">
    <div class="header-title">
      <h1>SIGNAL-FOG</h1>
      <span>KCTC 과학화전투 시뮬레이터 // v0.4</span>
    </div>
    <div class="header-status">
      <span><span class="status-dot" id="dot-comms"></span> COMMS</span>
      <span><span class="status-dot amber" id="dot-ai"></span> GEMINI AI</span>
      <span id="clock" style="color:var(--col-green);letter-spacing:.1em;"></span>
    </div>
  </header>

  <!-- ── MAIN LAYOUT ── -->
  <div id="main-layout">

    <!-- ── CENTER (Three.js) — 전체 영역 ── -->
    <div id="game-canvas-container">

      <!-- 부팅 화면 -->
      <div id="boot-screen">
        <div class="boot-logo">SIGNAL<br>FOG</div>
        <div class="boot-sub"><span>육군창업경진대회 2026 // 팀 LNG</span></div>
        <div id="boot-log"></div>
        <div class="boot-bar-wrap"><div id="boot-bar"></div></div>
      </div>

      <!-- HUD 상단 -->
      <div id="hud-overlay">
        <div class="hud-chip">TURN <span class="val" id="hud-turn">01</span></div>
        <div class="hud-chip">GRID <span class="val" id="hud-coord">--</span></div>
        <div class="hud-chip">PHASE <span class="val" id="hud-phase">준비</span></div>
      </div>

      <!-- 배터리 / 페이즈 / 지형 / 배급소 칩 -->
      <div id="info-chips">
        <div class="info-chip">
          배터리&nbsp;<span class="val warn" id="battery-val">100%</span>
        </div>
        <div class="info-chip">
          페이즈&nbsp;<span class="val" id="phase-val">준비 중</span>
        </div>
        <div class="info-chip" id="terrain-warn">
          ⚠ 통신 음영 구역
        </div>
        <div id="supply-chip" style="display:none;">
          <span style="font-size:.64rem;color:#1e5070;letter-spacing:.1em;">▸ 배급소</span>
          <div id="depot-status-lines"></div>
        </div>
      </div>

      <!-- 분대 상태 오버레이 (좌하단) -->
      <div id="squad-overlay">
        <div id="squad-list"></div>
      </div>

      <!-- 통신 로그 오버레이 (우하단) -->
      <div id="comms-overlay">
        <div id="comms-overlay-title">▸ 통신 채널 // 지휘</div>
        <div id="chat-log"></div>
        <div id="chat-input-area">
          <input id="chat-input" type="text" placeholder="무전 내용 입력 / SEND" maxlength="80" />
          <button id="chat-send" onclick="sendChat()">SEND</button>
        </div>
      </div>

      <!-- Squad Picker -->
      <div id="squad-picker"></div>

    </div><!-- /game-canvas-container -->
  </div><!-- /main-layout -->

  <!-- ── FOOTER ── -->
  <footer id="footer">
    <div class="turn-timer-wrap">
      <div class="turn-label">TURN INPUT</div>
      <div id="turn-timer">90</div>
      <div class="timer-bar-wrap"><div id="timer-bar"></div></div>
    </div>
    <div class="footer-status" id="footer-status">대기 중 — 분대 명령 입력 후 CONFIRM</div>
    <div class="action-buttons">
      <button class="btn" onclick="holdAction()">HOLD</button>
      <button class="btn primary" onclick="confirmTurn()">CONFIRM</button>
      <button class="btn danger" onclick="surrenderAction()">항복</button>
    </div>
  </footer>

  <!-- ── 결과 오버레이 ── -->
  <div id="result-overlay">
    <div id="result-panel">
      <div id="result-reason">훈련 종료</div>
      <div id="result-title">승리</div>
      <div class="result-sep"></div>
      <div id="result-body"></div>
      <button class="btn primary" onclick="location.reload()">▶ 다시 시작</button>
    </div>
  </div>

</div><!-- /app-wrapper -->

<script>
  /* ── 부팅 시퀀스 ── */
  const BOOT_LINES = [
    '> SIGNAL-FOG v0.5 초기화 중...',
    '> Three.js 0.128.0 로드 완료',
    '> Howler.js 사운드 엔진 활성화',
    '> 전술 그리드 생성 중...',
    '> 지형 생성: 개활지 / 수풀 / 계곡 / 고지 / 하천 / 교량',
    '> Gemini AI 클라이언트 준비 중...',
    '> 폴백 AI (전술 이동) 모듈 대기',
    '> 통신 오류 시스템 (오청 3종) 초기화',
    '> 포그 오브 워 — 시야 반경 3타일',
    '> 분대 편성 시스템 로드 완료',
    '> 보급 시스템 — 물 / 전투식량 / 배급소 초기화',
    '> 무기 체계 — 소총 / 기관총(MG) / 박격포(MT) 로드',
    '> 전술 시뮬레이터 시작',
  ];

  let bootIdx = 0;
  const bootLog = document.getElementById('boot-log');
  const bootBar = document.getElementById('boot-bar');
  const bootScr = document.getElementById('boot-screen');

  function bootStep() {
    if (bootIdx >= BOOT_LINES.length) {
      setTimeout(() => {
        bootScr.style.transition = 'opacity .6s';
        bootScr.style.opacity = '0';
        setTimeout(() => {
          bootScr.style.display = 'none';
          if (typeof initGame === 'function') initGame();
        }, 650);
      }, 400);
      return;
    }
    const line = document.createElement('div');
    line.className   = 'log-line';
    line.textContent = BOOT_LINES[bootIdx];
    line.style.animationDelay = '0s';
    bootLog.appendChild(line);
    bootIdx++;
    bootBar.style.width = (bootIdx / BOOT_LINES.length * 100) + '%';
    setTimeout(bootStep, 220 + Math.random() * 180);
  }

  /* ── 로드 완료 시 APIKeyModal 표시 ── */
  window.addEventListener('load', () => {
    requestAnimationFrame(() => {
      APIKeyModal.show(() => setTimeout(bootStep, 300));
    });
  });

  /* ── 시계 ── */
  function updateClock() {
    const n = new Date();
    document.getElementById('clock').textContent =
      String(n.getHours()).padStart(2,'0') + ':' +
      String(n.getMinutes()).padStart(2,'0') + ':' +
      String(n.getSeconds()).padStart(2,'0') + ' KST';
  }
  updateClock(); setInterval(updateClock, 1000);

  /* ── 분대 선택 (squad-overlay 내 카드 클릭) ── */
  function selectSquad(card, squadId) {
    if (window.gameScene && typeof window.gameScene.selectSquadById === 'function') {
      window.gameScene.selectSquadById(squadId);
    } else {
      document.querySelectorAll('.squad-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
    }
  }
</script>
